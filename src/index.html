<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BookBloom</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- 1. Ikonat FontAwesome (Kjo shton vizatimet e librave) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- 2. Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 3. Fonti Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #fff5f7 0%, #f3e5f5 100%); 
      min-height: 100vh;
      color: #4a148c;
    }
    .gradient-text {
      background: linear-gradient(45deg, #f4a7bb, #7b1fa2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }
    .btn-gradient {
      background: linear-gradient(45deg, #f4a7bb, #7b1fa2) !important;
      border: none !important; color: white !important;
      border-radius: 50px !important; padding: 10px 25px !important;
      font-weight: 600 !important; transition: 0.3s;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.8) !important;
      backdrop-filter: blur(10px);
      border-radius: 20px !important;
      border: 1px solid rgba(255, 255, 255, 0.5) !important;
    }
  </style>
</head>
<body>
  <!-- Mos e harro këtë, është pika ku nis Angular -->
  <app-root></app-root>
</body>
</html>
